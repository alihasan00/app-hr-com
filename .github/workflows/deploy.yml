name: Deploy to Azure Container Apps

on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write   # required for azure/login OIDC federation
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # `make build-image` calls `build-args-export` first, which pulls
      # NEXT_PUBLIC_* values from Key Vault into env via $(eval export ...).
      # Requires the SP to have `Key Vault Secrets User` on app-hr-com-kv.
      - run: make build-image

      # `make build-image-push` + `build-image-push-build-stage` each depend
      # on `build-image-login` which runs `az acr login --name apphrcomacr`.
      # Requires the SP to have `AcrPush` on apphrcomacr.
      - run: make build-image-push
      - run: make build-image-push-build-stage

  deploy:
    concurrency:
      group: deploy-lock
      cancel-in-progress: false
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: make build-image-pull
      - run: make build-image-promote

      - uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: app-hr-com-rg
          containerAppName: app-hr-com
          imageToDeploy: apphrcomacr.azurecr.io/app-hr-com:${{ github.sha }}
